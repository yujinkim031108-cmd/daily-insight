name: Daily Insight Update

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 KST (= UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic lxml

      - name: Run crawler
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python crawl.py --days 1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js history.js seen_urls.json
          git diff --staged --quiet || git commit -m "Daily update $(date +%Y-%m-%d)"
          git push
